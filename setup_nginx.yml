- name: Setup Nginx with Custom file
  hosts: servers
  become: yes

  tasks:
    - name: Install Nginx
      apt:
        name: nginx
        state: present


    - name: copy the custom html file
      copy:
        src: index.html
        dest: /var/www/html


    - name: Restart nginx
      service:
        name: nginx
        state: reloaded

    - name: Enable Nginx
      systemd_service:
        name: nginx
        enabled: true


